# Standalone furble port for Waveshare ESP32-S3-ePaper-1.54
# Phase 7 target: ESP-IDF build + Touch ePaper 1.54 variant support.

[furble_epaper154]
build_flags = -Wall -Wextra
  -DFURBLE_TEST_VERSION=0
  -DFURBLE_BATTERY_DEBUG=0
  -DFURBLE_WAVESHARE_EPAPER154

[env:esp32-s3-epaper154]
platform = espressif32@6.12.0
platform_packages = framework-espidf@3.50402.0
board = esp32-s3-devkitc-1
board_build.f_cpu = 80000000L
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB
framework = espidf
upload_protocol = esptool
monitor_speed = 115200
build_flags = ${furble_epaper154.build_flags}
  -DFURBLE_VERSION=\"epaper154-phase6\"

[env:esp32-s3-touch-epaper154]
platform = espressif32@6.12.0
platform_packages = framework-espidf@3.50402.0
board = esp32-s3-devkitc-1
board_build.f_cpu = 80000000L
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB
framework = espidf
upload_protocol = esptool
monitor_speed = 115200
build_flags = ${furble_epaper154.build_flags}
  -DFURBLE_VERSION=\"epaper154-touch-phase7\"
  -DFURBLE_WAVESHARE_TOUCH_EPAPER154
